<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Feedback</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    /* HEADER */
    header {
      background: #333;
      color: white;
      padding: 15px;
    }

    nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }

    
    section {
      padding: 30px;
    }

    .feedback-form {
      max-width: 400px;
      margin: auto;
      border: 1px solid #ccc;
      padding: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
    }

    
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="feedback.html">Feedback</a>
  </nav>
</header>

<section>
  <h2>Customer Feedback</h2>

  <form class="feedback-form">
    <label>Name</label>
    <input type="text" placeholder="Enter your name" required>

    <label>Email</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Rating</label>
    <select required>
      <option value="">Select</option>
      <option>Excellent</option>
      <option>Good</option>
      <option>Average</option>
      <option>Poor</option>
    </select>

    <label>Message</label>
    <textarea rows="4" placeholder="Write your feedback"></textarea>

    <button type="submit">Submit</button>
  </form>
</section>

<footer>
  <p>© 2026 My Restaurant</p>
</footer>

</body>
</html>
